name: build-iso

# Manual-only (workflow_dispatch), deliberately NOT on push/schedule. This
# repo's whole iso/ pipeline has never been run end to end by a human yet
# (live-build doesn't run on macOS, see iso/README.md "Status") -- this
# workflow is the first place it actually CAN run for real, since GitHub's
# ubuntu-latest runners are real Ubuntu VMs with root and loop-device
# access, unlike this Mac. Gating it to manual dispatch means a careless
# push doesn't burn CI minutes on a pipeline whose first real run might
# fail partway through and need iteration, and a nightly schedule isn't
# added until at least one manual run has actually succeeded.

on:
  workflow_dispatch:
    inputs:
      strain:
        description: "Strain to build"
        required: true
        default: "workstation"
        type: choice
        options:
          - workstation
          - laptop
          - lowspec
          - server
          - handheld
          - cloud
      publish_release:
        description: "Publish the ISO to GitHub Releases (public, no-login download)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # needed to create/update Releases
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        # Desktop ISOs (GNOME/LXQt + a full Ubuntu base) are large, and
        # ubuntu-latest runners ship a lot of preinstalled toolchains
        # (.NET, Android SDK, etc.) this build doesn't need. Removing them
        # up front rather than discovering a "no space left on device"
        # failure partway through a multi-hour-feeling live-build run.
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install live-build
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y live-build

      - name: Build ISO
        working-directory: iso
        run: |
          set -euo pipefail
          sudo ./build.sh "${{ inputs.strain }}"

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refract-os-${{ inputs.strain }}
          # Glob, not a fixed filename: if build.sh's rename step doesn't
          # run (build failed before producing output), this still uploads
          # whatever live-build did produce for debugging instead of the
          # whole step failing on a missing-file error.
          path: iso/*.iso
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to Releases (public, no-login download)
        if: ${{ success() && inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ISO=$(ls iso/*.iso | head -n1)
          [ -n "$ISO" ] || { echo "no ISO produced — nothing to publish" >&2; exit 1; }
          strain="${{ inputs.strain }}"; tag="latest-${strain}"
          sha=$(sha256sum "$ISO" | cut -d' ' -f1)
          echo "$sha  $(basename "$ISO")" > "iso/${strain}.sha256"
          notes="Rolling latest **${strain}** build of Refract OS.

          **Flash it (any OS):** balenaEtcher (Windows / macOS / Linux) or Rufus (Windows, *DD Image* mode). No Linux needed to install.
          SHA-256: \`${sha}\`

          ⚠ Boots via BIOS/CSM for now (UEFI in progress). Apple-Silicon Macs can create the USB but can't boot an x86 OS."
          # Rolling per-strain release tag: create if missing, then clobber the asset.
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
                 --title "Refract OS — latest ${strain}" --notes "$notes" --prerelease
          gh release upload "$tag" "$ISO" "iso/${strain}.sha256" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Published $(basename "$ISO") to release '$tag'."
