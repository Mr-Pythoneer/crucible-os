name: theme-probe
# Throwaway diagnostic (v4): test the ACTUAL fixes. WhiteSur under a pseudo-TTY
# (its installer's exec-spinner no-ops without a TTY), and blur-my-shell
# assembled by hand (make build fails Error 127 on a headless runner).
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y sassc libglib2.0-dev-bin libxml2-utils git \
            gnome-themes-extra make gettext

      - name: WhiteSur under a pseudo-TTY (script)
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/vinceliuice/WhiteSur-gtk-theme.git ws
          mkdir -p /tmp/ws-out
          script -qfec "ws/install.sh -d /tmp/ws-out" /dev/null 2>&1 | tail -20 || true
          echo "=== /tmp/ws-out contents ==="; ls /tmp/ws-out 2>/dev/null || echo "(empty)"
          ls -d /tmp/ws-out/WhiteSur-Dark 2>/dev/null && echo "WHITESUR_OK" || echo "WHITESUR_MISSING"

      - name: blur-my-shell layout + manual assemble
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/aunetx/blur-my-shell.git bms
          echo "=== repo root ==="; ls bms
          echo "=== src/ ==="; ls bms/src 2>/dev/null || echo "(no src)"
          echo "=== resources/ ==="; ls bms/resources 2>/dev/null || echo "(no resources)"
          echo "=== Makefile head ==="; sed -n '1,30p' bms/Makefile
          mkdir -p /tmp/ext
          cp -r bms/src/* /tmp/ext/ 2>/dev/null || true
          cp bms/metadata.json /tmp/ext/ 2>/dev/null || true
          [ -d bms/schemas ] && cp -r bms/schemas /tmp/ext/ && glib-compile-schemas /tmp/ext/schemas 2>&1 || true
          echo "=== assembled /tmp/ext ==="; ls -R /tmp/ext | head -40
          { [ -f /tmp/ext/extension.js ] && [ -f /tmp/ext/metadata.json ]; } && echo "EXT_OK" || echo "EXT_INCOMPLETE"
