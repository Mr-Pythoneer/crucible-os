# Calamares unpackfs — copies the live squashfs onto the freshly-partitioned
# target root. WITHOUT this file the unpackfs job has no configuration and the
# install aborts partway through ("Bad unpackfs configuration"), so an install
# is impossible. Format per calamares/src/modules/unpackfs/unpackfs.conf.
#
# Path: the first real CI build (run 28564744308) confirmed this image uses the
# CASPER boot stack (Ubuntu-mode live-build installs casper 1.498 into the
# chroot), so the live medium is mounted at /cdrom and the squashfs lives at
# casper/filesystem.squashfs — the same source path noble-based Calamares
# distros (e.g. Lubuntu 24.04) use. If the build host were Debian's modern
# live-build (live-boot stack) instead, the path would be
# /run/live/medium/live/filesystem.squashfs. Final confirmation still needs a
# real boot + install run (see iso/calamares/README.md).
unpack:
    - source: "/cdrom/casper/filesystem.squashfs"
      sourcefs: "squashfs"
      destination: ""
